<section class="section-card">
  <h2>Habilidades</h2>
  <div *ngFor="let skill of skillsList" class="item-view skill-item">
    
    <ng-container *ngIf="!isEditing">
      <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
        <strong>{{ skill.name }}</strong>
        <span style="color: #718096; font-size: 0.9rem;">{{ skill.percentaje }}%</span>
      </div>
      <div class="progress-bar">
        <div [style.width]="skill.percentaje + '%'" style="background-color: #3b82f6; height: 100%; border-radius: 10px;"></div>
      </div>
    </ng-container>

    <ng-container *ngIf="isEditing">
      <div class="edit-card">
        <input [(ngModel)]="skill.name" placeholder="Tecnología o Habilidad">
        <input type="number" [(ngModel)]="skill.percentaje" placeholder="Dominio (0-100)">
        <button class="btn-save" (click)="guardar(skill)">Guardar</button>
        <button class="btn-delete" (click)="eliminar(skill.id)">Eliminar</button>
      </div>
    </ng-container>

  </div>
  <button class="btn-add" *ngIf="isEditing" (click)="agregar()">+ Añadir Habilidad</button>
</section>
