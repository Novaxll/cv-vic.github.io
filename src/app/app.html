<div class="edit-mode-toggle">
  <button (click)="toggleEditMode()">
    <span *ngIf="!isEditing">✏️ Modo Edición</span>
    <span *ngIf="isEditing">👁️ Vista Previa</span>
  </button>
</div>

<div class="cv-container">
  <app-header [isEditing]="isEditing"></app-header>
  
  <div class="cv-grid">
    <div class="cv-left-column">
      <app-work-experience [isEditing]="isEditing"></app-work-experience>
      <app-education [isEditing]="isEditing"></app-education>
      <app-languages [isEditing]="isEditing"></app-languages>
    </div>
    
    <div class="cv-right-column">
      <app-skills [isEditing]="isEditing"></app-skills>
      <app-certificates [isEditing]="isEditing"></app-certificates>
      <app-interests [isEditing]="isEditing"></app-interests>
    </div>
  </div>
</div>
